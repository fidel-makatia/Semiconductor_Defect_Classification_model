# Problem A: Intel Contest Configuration (all 8 defect classes + good)
# Grayscale images up to ~7000x5600
# Uses ONLY official challenge data
# Tuned for 96GB VRAM GPU

data:
  root: "../challenge/dataset/Dataset/Data/"
  img_size: 518
  defect_only: false
  # All classes: 0(good 7135), 1(253), 2(178), 3(9), 4(14), 5(411), 8(803), 9(319), 10(674)
  train_classes: [0, 1, 2, 5, 8, 9, 10]
  test_classes: [3, 4]
  all_classes: [0, 1, 2, 3, 4, 5, 8, 9, 10]

model:
  backbone: "dinov2"
  backbone_size: "large"           # DINOv2 ViT-L/14 (1024-dim, 304M params)
  freeze_backbone: true
  unfreeze_last_n: 6
  grad_checkpointing: true
  proj_hidden: 768
  proj_dim: 512

training:
  n_way: 5                         # 5-way from 7 training classes
  k_shot: 10
  n_query: 15
  n_episodes_train: 500
  n_episodes_val: 200
  epochs: 100
  lr: 3.0e-4
  lr_backbone: 5.0e-6
  warmup_epochs: 5
  weight_decay: 1.0e-4
  use_amp: true
  gradient_clip: 1.0
  patience: 30

evaluation:
  n_seeds: 5
  max_examples: 50
  kshot_values: [1, 3, 5, 10, 20]
  target_accuracy: 0.85

output:
  checkpoint_dir: "checkpoints/"
  results_dir: "outputs/"

seed: 42
